# ============================================================
# RedRock Code Audit Platform — Docker Compose 编排
# ============================================================
#
# 启动:
#   docker compose up -d
#
# 查看日志:
#   docker compose logs -f
#
# 停止:
#   docker compose down
#
# AI API Key 配置方式（任选其一）:
#   1. 环境变量: 取消下面 DEEPSEEK_API_KEY 的注释并填入 Key
#   2. Web 页面: 启动后访问 http://localhost:5000/settings 在页面设置
# ============================================================

services:
  app:
    build: .
    container_name: code-audit-platform
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # - DEEPSEEK_API_KEY=sk-xxx…xxxx
      # - DEEPSEEK_BASE_URL=https://api.deepseek.com
      # - DEEPSEEK_MODEL=deepseek-chat
      - SECRET_KEY=change-me-in-production
    volumes:
      # 持久化数据库 + 上传文件 + 解压源码
      - ./data:/app/data
    restart: unless-stopped
